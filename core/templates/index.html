<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>InsightPilot AI</title>
        <meta name="description" content="Home page of InsightPilot AI">

        <link rel="stylesheet" href="">

    <body>
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}" style="padding: 15px; margin-bottom: 20px; border: 1px solid transparent; border-radius: 4px; color: #3c763d; background-color: #dff0d8; border-color: #d6e9c6;">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
        {% endif %}

        <h1>Everything works!</h1>
        
        <script src="" async defer></script>
    </body>
